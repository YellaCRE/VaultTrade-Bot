vault:
  trading:
    provider: paper
    upbit:
      base-url: https://api.upbit.com
      access-key: ${UPBIT_ACCESS_KEY:}
      secret-key: ${UPBIT_SECRET_KEY:}
  market-data:
    provider: upbit
    upbit:
      base-url: https://api.upbit.com
  circuit-breaker:
    enabled: true
    failure-threshold: 3
    open-duration-ms: 30000
    half-open-max-calls: 1
  persistence:
    mode: jdbc
  scheduler:
    enabled: true
    cron: "*/5 * * * * *"
    zone: Asia/Seoul
    poll-delay-ms: 1000
    misfire-threshold-ms: 15000
    misfire-policy: FIRE_ONCE_NOW
    max-retry-attempts: 3
    retry-base-delay-ms: 2000
    retry-max-delay-ms: 30000
  outbox:
    relay-delay-ms: 1000
    batch-size: 100
    max-attempts: 5
    retry-base-delay-ms: 500
    retry-max-delay-ms: 30000
    redrive-delay-ms: 60000
    redrive-initial-delay-ms: 10000
    redrive-batch-size: 100

spring:
  datasource:
    url: jdbc:h2:file:./build/vaulttradebot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
